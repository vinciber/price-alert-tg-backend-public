name: Technical Signals Scan

on:
  schedule:
    # Runs every 4 hours: 0:15, 4:15, 8:15, 12:15, 16:15, 20:15 UTC
    - cron: '15 0,4,8,12,16,20 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Backend
        uses: actions/checkout@v4
        with:
          repository: vinciber/price-alert-tg-backend
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-worker.txt

      - name: Run Signals Scan
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          LOG_LEVEL: INFO
        run: |
          echo "🔍 Starting Technical Signals Scan..."
          python execution/scripts/run_signals_scan.py
          echo "✅ Scan Complete"
