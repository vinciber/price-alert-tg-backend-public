name: Technical Signals Scan

on:
  schedule:
    # Runs every 4 hours: 0:25, 4:25, 8:25, 12:25, 16:25, 20:25 UTC
    # :25 avoids mega_signal (:10, ~5min run), slow-checks (:33), mobile_alerts (:00/:15/:30/:45)
    - cron: '25 0,4,8,12,16,20 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Backend
        uses: actions/checkout@v4
        with:
          repository: vinciber/price-alert-tg-backend
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-signals.txt

      - name: Run Signals Scan
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          LOG_LEVEL: INFO
        run: |
          echo "🔍 Starting Technical Signals Scan..."
          python execution/scripts/run_signals_scan.py
          echo "✅ Scan Complete"
