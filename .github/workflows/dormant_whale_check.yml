name: Dormant Whale Wakeup Check

on:
  schedule:
    # Every hour at :08 UTC — Patoshi check costs 1 HTTP req when idle, curated wallets ~8 calls
    # Offset from whale_scraper (:00) and signals_scan (:25) to avoid resource contention
    - cron: '8 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Private Backend
        uses: actions/checkout@v4
        with:
          repository: vinciber/price-alert-tg-backend
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests firebase-admin python-dotenv

      - name: Run Dormant Whale Check
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_CHAT_ID: ${{ secrets.ADMIN_TELEGRAM_CHAT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          LOG_LEVEL: INFO
        run: |
          echo "🔍 Starting Dormant Whale Wakeup Check..."
          python execution/scripts/run_dormant_whale_check.py
          echo "✅ Check Complete"
