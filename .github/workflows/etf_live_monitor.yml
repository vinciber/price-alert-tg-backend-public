name: ETF Live Action Monitor

on:
  schedule:
    # Runs every 30 minutes from 14:00 to 21:00 UTC (US Market Hours approx 9:30 AM to 4:00 PM EST)
    # Monday to Friday
    - cron: '*/30 14-20 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Backend
        uses: actions/checkout@v4
        with:
          repository: vinciber/price-alert-tg-backend
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure critical deps
          pip install requests pandas numpy supabase pytz websocket-client

      - name: Run ETF Live Action Monitor
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python execution/scripts/etf_monitor.py
